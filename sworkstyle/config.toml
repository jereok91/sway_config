# Sworkstyle config
# Format:
#   '{app_id_or_class}' = '{icon}'    (exact match on app_id / X11 class)
#   '/{regex}/'         = '{icon}'    (regex match on window title)
#
# Icons are Nerd Font v3 glyphs. The same Nerd Font must be
# configured in waybar/style.css for them to render.
#
# To find glyphs: https://www.nerdfonts.com/cheat-sheet
#
# sworkstyle auto-reloads this file on change.

fallback  = 'у°ҳ”'   # nf-md-file_document
separator = ' '

[matching]
# Terminals
'foot'        = 'пҢ…'   # nf-linux-foot
'footclient'  = 'пҢ…'
'alacritty'   = 'пҢҳ'   # nf-linux-alacritty
'kitty'       = 'у°„ӣ'   # nf-linux-kitty
'wezterm'     = 'пҚә'   # nf-linux-wezterm

# Editors / dev tools (exact app_id match)
'code'        = 'оңҢ'   # nf-seti-visual_studio_code (VS Code)
'code-oss'    = 'оңҢ'
'sublime_text'= 'оһӘ'   # nf-seti-sublime
'neovide'     = 'оҳҡ'   # nf-dev-neovim
'gvim'        = 'оҳ«'   # nf-dev-vim
'vim'         = 'оҹ…'
'nvim'        = 'оҳ«'

# nvim/vim running INSIDE any terminal: match by window title.
# (the app_id will be the terminal itself, e.g. 'foot', so we
# have to inspect the title set by nvim to detect it.)
'/^[\u2500]?(Nvim|Vim|NVIM|VIM)/' = 'оҳҡ'   # nf-dev-neovim
'/lazygit|Lazygit|LAZYGIT/'  = 'пҒў'   # nf-md-source_branch

# Browsers
'firefox'         = 'пҚ°'   # nf-md-firefox
'firefox-esr'     = 'оҪҺ'
'chromium'        = 'у°ҠҜ'   # nf-md-google_chrome
'chrome'          = 'оқғ'
'google-chrome'   = 'оқғ'
'brave-browser'   = 'п’Ҳ'   # reuse chrome glyph
'Brave-browser'   = 'п’Ҳ'
'thorium-browser' = 'о«Ә'
'librewolf'       = 'оҪҺ'
'zen-browser'     = 'оҪҺ'

# Chat / mail
'discord'             = 'пҮҝ'   # nf-md-discord
'discord-canary'      = 'оӘҶ'
'Element'             = 'оӘҶ'
'Slack'               = 'оӘ¬'   # nf-md-slack
'telegram-desktop'    = 'пӢҶ'   # nf-md-telegram
'org.telegram.desktop'= 'пӢҶ'
'thunderbird'         = 'пҚ°'   # nf-md-thunderbird
'teams-for-linux'     = 'о¬№'   # nf-md-microsoft_teams
'microsoft-teams'     = 'у°Ҡ»'
'elecwhat'            = 'пҲІ'   # nf-md-forum (WhatsApp client)

# Files / system
'pcmanfm'         = 'пҒ»'   # nf-md-folder
'pcmanfm-qt'      = 'пҒ»'
'nautilus'        = 'пҒ»'
'dolphin'         = 'пҒ»'
'thunar'          = 'пҒ»'
'btop'            = 'п’…'   # nf-cod-terminal_badge
'pulsemixer'      = 'пҒ—'   # nf-md-volume_medium
'bluetuith'       = 'пҠ“'   # nf-md-bluetooth
'calcurse'        = 'пҒі'   # nf-md-calendar
'lf'              = 'пҒј'   # nf-md-folder_open
'ranger'          = 'пҒј'
'yazi'            = 'пҒј'

# Wayland / Sway helpers
'wluma'           = 'п’’'   # nf-md-white_balance_sunny
