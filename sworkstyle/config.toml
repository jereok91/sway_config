# Sworkstyle config
# Format:
#   '{app_id_or_class}' = '{icon}'    (exact match on app_id / X11 class)
#   '/{regex}/'         = '{icon}'    (regex match on window title)
#
# Icons are Nerd Font v3 glyphs. The same Nerd Font must be
# configured in waybar/style.css for them to render.
#
# To find glyphs: https://www.nerdfonts.com/cheat-sheet
#
# sworkstyle auto-reloads this file on change.

fallback  = '´Çû'   # nf-md-file_document
separator = ' '

[matching]
# Terminals
'foot'        = '´îà'   # nf-linux-foot
'footclient'  = '´îà'
'alacritty'   = '´îİ'   # nf-linux-alacritty
'kitty'       = '´îÜ'   # nf-linux-kitty
'wezterm'     = '´ı║'   # nf-linux-wezterm

# Editors / dev tools (exact app_id match)
