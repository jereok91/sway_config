'Manjaro.manjaro-settings-manager' = 'п’“'
'swappy'          = 'пҖ®'   # nf-md-image

# Generic catch-alls
'/Electron/'             = 'пҖ—'   # nf-md-monitor
'/^Picture.in.picture$/i'= 'пҖҫ'   # nf-md-picture_in_picture
